<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather App</title>
    <style>
        body {
            /* Animated gradient background mesh */
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #2c3e50, #3498db);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            transition: background 1.5s ease;
        }

        /* Animation for moving background colors smoothly */
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
            width: 320px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.18);
            transition: transform 0.3s ease;
        }
        .weather-card:hover {
            transform: translateY(-5px);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255, 255, 255, 0.12);
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            text-align: center;
            color: white;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.65);
        }
        button {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 70px;
            transition: background 0.3s, transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
        .spin {
            animation: rotation 1.2s infinite linear;
            display: inline-block;
        }
        @keyframes rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .weather-info {
            display: none;
            animation: fadeIn 0.6s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .city {
            font-size: 1.8rem;
            margin: 10px 0;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.25);
        }
        .temp {
            font-size: 4rem;
            font-weight: 700;
            margin: 5px 0;
            text-shadow: 0 4px 8px rgba(0,0,0,0.25);
        }
        .description {
            font-size: 1.2rem;
            text-transform: capitalize;
            margin-bottom: 20px;
            opacity: 0.9;
            font-style: italic;
        }
        .details {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.15);
            font-size: 0.95rem;
        }
        .details div strong {
            display: block;
            font-size: 1.1rem;
            margin-top: 4px;
        }
        .error-msg {
            color: #ff8d8d;
            margin-top: 10px;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="search-box">
        <input type="text" id="city-input" placeholder="Enter city name...">
        <button id="search-btn" onclick="getWeather()">Go</button>
    </div>
    
    <div class="error-msg" id="error">City not found!</div>

    <div class="weather-info" id="weather-info">
        <div class="city" id="city-name">London</div>
        <div class="temp" id="temperature">22°C</div>
        <div class="description" id="description">Clear Sky</div>
        
        <div class="details">
            <div>
                <div>Humidity</div>
                <strong id="humidity">60%</strong>
            </div>
            <div>
                <div>Wind Speed</div>
                <strong id="wind">5 m/s</strong>
            </div>
        </div>
    </div>
</div>

<script>
    async function getWeather() {
        const cityInput = document.getElementById('city-input').value.trim();
        const errorDiv = document.getElementById('error');
        const infoDiv = document.getElementById('weather-info');
        const searchBtn = document.getElementById('search-btn');

        if (!cityInput) return;

        searchBtn.innerHTML = '<span class="spin">⏳</span>';
        searchBtn.disabled = true;

        try {
            const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityInput)}&count=1&language=en&format=json`;
            const geoResponse = await fetch(geoUrl);
            const geoData = await geoResponse.json();

            if (!geoData.results || geoData.results.length === 0) {
                throw new Error("City not found");
            }

            const { latitude, longitude, name, country } = geoData.results[0];

            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m`;
            const weatherResponse = await fetch(weatherUrl);
            const weatherData = await weatherResponse.json();

            const current = weatherData.current;
            const temp = Math.round(current.temperature_2m);
            const humidity = current.relative_humidity_2m;
            const wind = current.wind_speed_10m;
            const code = current.weather_code;

            let desc = "Clear Sky";
            // Dynamically updates the moving mesh gradients based on weather checks
            let bg = "linear-gradient(-45deg, #f7b733, #fc4a1a, #e65c00, #f9d423)";

            if ([1, 2, 3].includes(code)) {
                desc = "Partly Cloudy";
                bg = "linear-gradient(-45deg, #757f9a, #4a569d, #3f4c6b, #606c88)";
            } else if ([45, 48].includes(code)) {
                desc = "Foggy";
                bg = "linear-gradient(-45deg, #8e9eab, #eef2f3, #bdc3c7, #2c3e50)";
            } else if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) {
                desc = "Rainy";
                bg = "linear-gradient(-45deg, #616c7d, #485563, #2b3a42, #3f4f57)";
            } else if ([71, 73, 75, 77, 85, 86].includes(code)) {
                desc = "Snowy";
                bg = "linear-gradient(-45deg, #e6dada, #274046, #eef2f3, #8e9eab)";
            } else if ([95, 96, 99].includes(code)) {
                desc = "Thunderstorm";
                bg = "linear-gradient(-45deg, #141e30, #243b55, #0f2027, #203a43)";
            }

            document.getElementById('city-name').innerText = `${name}, ${country}`;
            document.getElementById('temperature').innerText = `${temp}°C`;
            document.getElementById('description').innerText = desc;
            document.getElementById('humidity').innerText = `${humidity}%`;
            document.getElementById('wind').innerText = `${wind} km/h`;
            
            // Assign the fresh color palette to the background
            document.body.style.background = bg;
            document.body.style.backgroundSize = "400% 400%";

            errorDiv.style.display = "none";
            infoDiv.style.display = "block";
            infoDiv.style.opacity = 0;
            setTimeout(() => infoDiv.style.opacity = 1, 10);

        } catch (err) {
            infoDiv.style.display = "none";
            errorDiv.style.display = "block";
        } finally {
            searchBtn.innerHTML = 'Go';
            searchBtn.disabled = false;
        }
    }
</script>

</body>
</html>
