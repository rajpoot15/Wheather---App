<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather App</title>
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            transition: background 0.5s ease;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 320px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            text-align: center;
        }
        button {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:active {
            background: #c0392b;
        }
        .weather-info {
            display: none;
        }
        .city {
            font-size: 1.8rem;
            margin: 10px 0;
            font-weight: 600;
        }
        .temp {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 10px 0;
        }
        .description {
            font-size: 1.2rem;
            text-transform: capitalize;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .details {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9rem;
        }
        .error-msg {
            color: #ff8d8d;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="search-box">
        <input type="text" id="city-input" placeholder="Enter city name...">
        <button onclick="getWeather()">Go</button>
    </div>
    
    <div class="error-msg" id="error">City not found!</div>

    <div class="weather-info" id="weather-info">
        <div class="city" id="city-name">London</div>
        <div class="temp" id="temperature">22°C</div>
        <div class="description" id="description">Clear Sky</div>
        
        <div class="details">
            <div>
                <div>Humidity</div>
                <strong id="humidity">60%</strong>
            </div>
            <div>
                <div>Wind Speed</div>
                <strong id="wind">5 m/s</strong>
            </div>
        </div>
    </div>
</div>

<script>
    // Paste your free OpenWeather API key inside the quotes below
    const apiKey = "YOUR_API_KEY_HERE"; 

    async function getWeather() {
        const city = document.getElementById('city-input').value;
        const errorDiv = document.getElementById('error');
        const infoDiv = document.getElementById('weather-info');

        if (!city) return;

        const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Not found");
            
            const data = await response.json();
            
            document.getElementById('city-name').innerText = data.name;
            document.getElementById('temperature').innerText = `${Math.round(data.main.temp)}°C`;
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('humidity').innerText = `${data.main.humidity}%`;
            document.getElementById('wind').innerText = `${data.wind.speed} m/s`;

            // Changes background dynamic styling depending on weather state
            const mainWeather = data.weather[0].main.toLowerCase();
            if (mainWeather.includes('rain') || mainWeather.includes('drizzle')) {
                document.body.style.background = "linear-gradient(135deg, #616c7d, #485563)";
            } else if (mainWeather.includes('cloud')) {
                document.body.style.background = "linear-gradient(135deg, #757f9a, #4a569d)";
            } else if (mainWeather.includes('clear')) {
                document.body.style.background = "linear-gradient(135deg, #f7b733, #fc4a1a)";
            } else {
                document.body.style.background = "linear-gradient(135deg, #2c3e50, #3498db)";
            }

            errorDiv.style.display = "none";
            infoDiv.style.display = "block";
        } catch (err) {
            infoDiv.style.display = "none";
            errorDiv.style.display = "block";
        }
    }
</script>

</body>
</html>
