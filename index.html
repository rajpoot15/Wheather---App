<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather App</title>
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            transition: background 0.5s ease;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 320px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
            text-align: center;
        }
        button {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:active {
            background: #c0392b;
        }
        .weather-info {
            display: none;
        }
        .city {
            font-size: 1.8rem;
            margin: 10px 0;
            font-weight: 600;
        }
        .temp {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 10px 0;
        }
        .description {
            font-size: 1.2rem;
            text-transform: capitalize;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .details {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9rem;
        }
        .error-msg {
            color: #ff8d8d;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="search-box">
        <input type="text" id="city-input" placeholder="Enter city name...">
        <button onclick="getWeather()">Go</button>
    </div>
    
    <div class="error-msg" id="error">City not found!</div>

    <div class="weather-info" id="weather-info">
        <div class="city" id="city-name">London</div>
        <div class="temp" id="temperature">22°C</div>
        <div class="description" id="description">Clear Sky</div>
        
        <div class="details">
            <div>
                <div>Humidity</div>
                <strong id="humidity">60%</strong>
            </div>
            <div>
                <div>Wind Speed</div>
                <strong id="wind">5 m/s</strong>
            </div>
        </div>
    </div>
</div>

<script>
    async function getWeather() {
        const cityInput = document.getElementById('city-input').value.trim();
        const errorDiv = document.getElementById('error');
        const infoDiv = document.getElementById('weather-info');

        if (!cityInput) return;

        try {
            // Step 1: Get Latitude and Longitude for the city name (No API Key Required)
            const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityInput)}&count=1&language=en&format=json`;
            const geoResponse = await fetch(geoUrl);
            const geoData = await geoResponse.json();

            if (!geoData.results || geoData.results.length === 0) {
                throw new Error("City not found");
            }

            const { latitude, longitude, name, country } = geoData.results[0];

            // Step 2: Fetch weather data using coordinates (No API Key Required)
            const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m`;
            const weatherResponse = await fetch(weatherUrl);
            const weatherData = await weatherResponse.json();

            const current = weatherData.current;
            const temp = Math.round(current.temperature_2m);
            const humidity = current.relative_humidity_2m;
            const wind = current.wind_speed_10m;
            const code = current.weather_code;

            // Map weather codes to simple descriptions and backgrounds
            let desc = "Clear Sky";
            let bg = "linear-gradient(135deg, #f7b733, #fc4a1a)";

            if ([1, 2, 3].includes(code)) {
                desc = "Partly Cloudy";
                bg = "linear-gradient(135deg, #757f9a, #4a569d)";
            } else if ([45, 48].includes(code)) {
                desc = "Foggy";
                bg = "linear-gradient(135deg, #757f9a, #4a569d)";
            } else if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) {
                desc = "Rainy";
                bg = "linear-gradient(135deg, #616c7d, #485563)";
            } else if ([71, 73, 75, 77, 85, 86].includes(code)) {
                desc = "Snowy";
                bg = "linear-gradient(135deg, #e6dada, #274046)";
            } else if ([95, 96, 99].includes(code)) {
                desc = "Thunderstorm";
                bg = "linear-gradient(135deg, #141e30, #243b55)";
            }

            // Update UI elements
            document.getElementById('city-name').innerText = `${name}, ${country}`;
            document.getElementById('temperature').innerText = `${temp}°C`;
            document.getElementById('description').innerText = desc;
            document.getElementById('humidity').innerText = `${humidity}%`;
            document.getElementById('wind').innerText = `${wind} km/h`;
            document.body.style.background = bg;

            errorDiv.style.display = "none";
            infoDiv.style.display = "block";
        } catch (err) {
            infoDiv.style.display = "none";
            errorDiv.style.display = "block";
        }
    }
</script>

</body>
</html>
